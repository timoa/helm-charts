apiVersion: v2
name: multica
description: A Helm chart for Multica - AI-powered chat platform
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - multica
  - ai
  - chat
  - postgres
  - pgvector
home: https://github.com/multica-ai/multica
sources:
  - https://github.com/multica-ai/multica
# IMPORTANT: Bitnami PostgreSQL subchart has been removed due to security/maintenance concerns.
# This chart requires an external PostgreSQL database.
# Recommended options:
#   1. Managed PostgreSQL (AWS RDS, Google Cloud SQL, Azure, Supabase, Neon) - RECOMMENDED
#   2. CloudNativePG operator: https://cloudnative-pg.io/
#   3. Zalando Postgres Operator: https://github.com/zalando/postgres-operator
# Configure using externalPostgresql values in values.yaml
maintainers:
  - name: multica-ai
    url: https://github.com/multica-ai
