{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "multica.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "multica.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic between components
    - from:
        - podSelector:
            matchLabels:
              {{- include "multica.selectorLabels" . | nindent 14 }}
    # Allow frontend to access backend
    - from:
        - podSelector:
            matchLabels:
              {{- include "multica.frontendSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.config.port }}
    # Allow external access to frontend
    - from:
        - podSelector:
            matchLabels:
              {{- include "multica.backendSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3000
    # Additional custom ingress rules
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow internal communication
    - to:
        - podSelector:
            matchLabels:
              {{- include "multica.selectorLabels" . | nindent 14 }}
    # Allow database access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Additional custom egress rules
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
