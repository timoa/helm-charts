{{/*
Secret for sensitive Multica configuration
Only create if any sensitive values are provided inline
*/}}
{{- $createSecret := false }}
{{- if and (not .Values.secrets.jwt.existingSecret) .Values.secrets.jwt.value }}
  {{- $createSecret = true }}
{{- end }}
{{- if and (not .Values.externalPostgresql.existingSecret) .Values.externalPostgresql.password }}
  {{- $createSecret = true }}
{{- end }}
{{- if and (not .Values.secrets.google.existingSecret) .Values.secrets.google.value }}
  {{- $createSecret = true }}
{{- end }}
{{- if and (not .Values.secrets.resend.existingSecret) .Values.secrets.resend.value }}
  {{- $createSecret = true }}
{{- end }}
{{- if and (not .Values.secrets.cloudfront.existingSecret) .Values.secrets.cloudfront.value }}
  {{- $createSecret = true }}
{{- end }}

{{- if $createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multica.secretName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
type: Opaque
data:
  # JWT Secret
  {{- if and (not .Values.secrets.jwt.existingSecret) .Values.secrets.jwt.value }}
  {{ .Values.secrets.jwt.existingSecretKey }}: {{ .Values.secrets.jwt.value | b64enc | quote }}
  {{- end }}
  
  # PostgreSQL password
  {{- if and (not .Values.externalPostgresql.existingSecret) .Values.externalPostgresql.password }}
  {{ .Values.externalPostgresql.existingSecretPasswordKey }}: {{ .Values.externalPostgresql.password | b64enc | quote }}
  {{- end }}
  
  # Google OAuth Client Secret
  {{- if and (not .Values.secrets.google.existingSecret) .Values.secrets.google.value }}
  {{ .Values.secrets.google.existingSecretKey }}: {{ .Values.secrets.google.value | b64enc | quote }}
  {{- end }}
  
  # Resend API Key
  {{- if and (not .Values.secrets.resend.existingSecret) .Values.secrets.resend.value }}
  {{ .Values.secrets.resend.existingSecretKey }}: {{ .Values.secrets.resend.value | b64enc | quote }}
  {{- end }}
  
  # CloudFront Private Key
  {{- if and (not .Values.secrets.cloudfront.existingSecret) .Values.secrets.cloudfront.value }}
  {{ .Values.secrets.cloudfront.existingSecretKey }}: {{ .Values.secrets.cloudfront.value | b64enc | quote }}
  {{- end }}
{{- end }}
